name = "workspace"

# Companion workspace for thefundamentaltheor3m/Sphere-Packing-Lean: the Lean
# code stays upstream and is brought in as a pinned dependency (the "depend on
# it" path in docs/tutorial/quick-start/work-on-external-project.md). Blueprint
# chapters under content/blueprint/ are markdown reference chapters whose items
# carry lean="..." pointing at upstream declarations.
#
# No defaultTargets: the dependency is not a root-package target. Build its
# modules explicitly, one +Module per blueprint.config.json lakeRoots entry:
#   lake exe cache get        # prebuilt mathlib (upstream pins rev v4.30.0)
#   lake build +SpherePacking

[[require]]
name = "SpherePacking"
git = "https://github.com/thefundamentaltheor3m/Sphere-Packing-Lean"
rev = "d80a24cbadf0ad5002b78d9c278c6f54b0d42d71"

[[lean_exe]]
name = "blueprint-data"
srcDir = "scripts/blueprint-data"
root = "BlueprintData"
supportInterpreter = true
